app:
  name: "文明用语机器人"
  language: "zh-CN"
  cycle_pause_seconds: 2
  max_error_pause_seconds: 5

paths:
  logs_dir: "logs"
  audio_temp_dir: "recordings"
  tts_output_dir: "recordings"

privacy:
  keep_recordings: false

audio:
  input_device: "auto"
  input_device_keywords:
    - "USB"
    - "Composite"
    - "Jieli"
    - "Microphone"
    - "Mic"
    - "Audio"
  output_device_keywords:
    - "USB"
    - "Speaker"
    - "Headphone"
    - "HDMI"
    - "Audio"

openai:
  api_key_env: "OPENAI_API_KEY"
  timeout_seconds: 30
  max_retries: 2

deepseek:
  api_key_env: "DEEPSEEK_API_KEY"
  base_url: "https://api.deepseek.com"
  timeout_seconds: 30
  max_retries: 2

tencentcloud:
  secret_id_env: "TENCENTCLOUD_SECRET_ID"
  secret_key_env: "TENCENTCLOUD_SECRET_KEY"
  region: "ap-shanghai"
  engine_model_type: "16k_zh"
  voice_format: "wav"
  convert_num_mode: 1
  filter_dirty: 0
  filter_modal: 0
  filter_punc: 0
  word_info: 0
  hotword_id: ""
  hotword_list: "饭团饭团|11,范小团|10,小朋友|8"

wakeword:
  engine: "console"
  display_wake_word: "饭团饭团"
  wake_words:
    - "饭团饭团"
  wake_aliases:
    - "饭团"
    - "饭团你好"
  fuzzy_enabled: true
  fuzzy_threshold: 0.62
  require_greeting: false
  greeting_words:
    - "你好"
    - "你号"
  subject_keywords:
    - "饭团"
  prompt: "输入“饭团饭团”并回车来模拟唤醒。"
  listen_seconds: 2.5
  idle_pause_seconds: 0.2
  input_sample_rate: 48000
  model_sample_rate: 16000
  frame_ms: 80
  sample_rate: 16000
  channels: 1
  device: "auto"
  delete_chunks: true
  model_path: "models/vosk-model-small-cn-0.22"
  model_paths:
    - "models/openwakeword/fantuan_fantuan.onnx"
  target_labels:
    - "fantuan_fantuan"
  threshold: 0.78
  patience_frames: 3
  debounce_seconds: 2.5
  rms_threshold: 180
  rms_patience_frames: 2
  inference_framework: "onnx"
  allow_pretrained_models: false
  vad_enabled: true
  vad_threshold: 0.55
  noise_suppression_enabled: true
  noise_suppression_fallback: true
  log_scores: false
  block_size: 8000
  grammar_enabled: true

greeting:
  text: "小朋友你好"
  tts_text: "小朋友，你好呀。"
  enabled_in_main_flow: true
  use_prerecorded_audio: false
  audio_path: "assets/audio/greeting.wav"

post_wake_speech:
  enabled: true
  continuous_session: true
  timeout_seconds: 30
  sample_rate: 48000
  channels: 1
  device: "auto"
  block_seconds: 0.25
  rms_threshold: 500
  required_blocks: 2
  pre_roll_seconds: 1.0
  error_pause_seconds: 1

recording:
  engine: "sounddevice"
  stop_on_silence: true
  max_duration_seconds: 7
  min_duration_seconds: 1.4
  silence_duration_seconds: 1.2
  silence_rms_threshold: 500
  block_seconds: 0.2
  sample_rate: 16000
  channels: 1
  device: "auto"

speech_to_text:
  provider: "vosk"
  model: "gpt-4o-mini-transcribe"
  language: "zh"
  model_path: "models/vosk-model-small-cn-0.22"
  sample_rate: 16000
  chunk_size: 4000
  static_text: "这是一段离线测试语音"

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  temperature: 0.2
  max_tokens: 500

analysis:
  remind_only_on_uncivilized: true
  remind_below_score: 85

tts:
  provider: "piper"
  # 如果要切换到腾讯云 TTS，可改成 "tencentcloud"
  binary:
    - "python"
    - "-m"
    - "piper"
  model_path: "models/piper/zh_CN-huayan-medium.onnx"
  model_config_path: "models/piper/zh_CN-huayan-medium.onnx.json"
  speaker: null
  length_scale: 1.12
  noise_scale: 0.82
  noise_w: 0.95
  sentence_silence: 0.18
  volume: 1.0
  no_normalize: false
  output_format: "wav"
  codec: "wav"
  sample_rate: 16000
  model_type: 1
  voice_type: 101001
  primary_language: 1
  speed: 0
  volume: 0
  enable_subtitle: false
  segment_rate: 0
  emotion_category: ""
  emotion_intensity: 100
  enabled: true
  cache_enabled: false
  command: null
  output_path: "recordings/piper_tts.wav"
  fallback_audio_path: "assets/audio/greeting.wav"

tencentcloud_tts:
  secret_id_env: "TENCENTCLOUD_SECRET_ID"
  secret_key_env: "TENCENTCLOUD_SECRET_KEY"
  region: "ap-shanghai"

playback:
  enabled: true
  command: "auto"
  prefer_pipewire: true
  alsa_device: "auto"

display:
  engine: "console"
  fullscreen: true
  font_family: "Noto Sans CJK SC"
  font_size: 36
  result_hold_seconds: 8

robot_animation:
  frame_dir: "assets/robot/fantuan_jump"
  duration_seconds: 10
  frame_delay_seconds: 0.12
  final_frame: 7
  background_color: "#f7f3e8"
  text_color: "#1d2b2a"
  font_size: 36
