app:
  name: "文明用语机器人"
  language: "zh-CN"
  cycle_pause_seconds: 2
  max_error_pause_seconds: 5

paths:
  logs_dir: "logs"
  audio_temp_dir: "recordings"
  tts_output_dir: "recordings"

privacy:
  keep_recordings: false

openai:
  api_key_env: "OPENAI_API_KEY"
  timeout_seconds: 30
  max_retries: 2

deepseek:
  api_key_env: "DEEPSEEK_API_KEY"
  base_url: "https://api.deepseek.com"
  timeout_seconds: 30
  max_retries: 2

wakeword:
  engine: "console"
  display_wake_word: "范小团你好"
  wake_words:
    - "范小团你好"
  wake_aliases:
    - "饭小团你好"
    - "办小团你好"
    - "但小团你好"
    - "分小团你好"
    - "小团你好"
    - "饭小团你号"
    - "办小团你号"
    - "但小团你号"
    - "分小团你号"
    - "小团你号"
  fuzzy_enabled: true
  fuzzy_threshold: 0.62
  require_greeting: true
  greeting_words:
    - "你好"
    - "你号"
  subject_keywords:
    - "小团"
  prompt: "输入“范小团你好”并回车来模拟唤醒。"
  listen_seconds: 2.5
  idle_pause_seconds: 0.2
  sample_rate: 16000
  channels: 1
  device: null
  delete_chunks: true
  model_path: "models/vosk-model-small-cn-0.22"
  block_size: 8000
  grammar_enabled: true

greeting:
  text: "小朋友你好"
  audio_path: "assets/audio/greeting.wav"

post_wake_speech:
  enabled: true
  timeout_seconds: 30
  sample_rate: 48000
  channels: 1
  device: 1
  block_seconds: 0.25
  rms_threshold: 500
  required_blocks: 2

recording:
  engine: "sounddevice"
  duration_seconds: 7
  sample_rate: 16000
  channels: 1
  device: null

speech_to_text:
  provider: "static"
  model: "gpt-4o-mini-transcribe"
  language: "zh"
  static_text: "这是一段离线测试语音"

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  temperature: 0.2
  max_tokens: 500

tts:
  provider: "local_command"
  model: "espeak-ng"
  voice: "cmn"
  speed: 150
  output_format: "wav"
  enabled: true
  cache_enabled: true
  command:
    - "espeak-ng"
    - "-v"
    - "cmn"
    - "-s"
    - "150"
    - "-w"
    - "{output}"
    - "{text}"
  fallback_audio_path: "assets/audio/greeting.wav"

playback:
  enabled: true
  command: "auto"
  alsa_device: null

display:
  engine: "console"
  fullscreen: true
  font_family: "Noto Sans CJK SC"
  font_size: 36
  result_hold_seconds: 8
