app:
  name: "文明用语机器人"
  language: "zh-CN"
  cycle_pause_seconds: 2
  max_error_pause_seconds: 5

paths:
  logs_dir: "logs"
  audio_temp_dir: "recordings"
  tts_output_dir: "recordings"

privacy:
  keep_recordings: false

audio:
  input_device: "auto"
  input_device_keywords:
    - "USB"
    - "Composite"
    - "Jieli"
    - "Microphone"
    - "Mic"
    - "Audio"
  output_device_keywords:
    - "USB"
    - "Speaker"
    - "Headphone"
    - "HDMI"
    - "Audio"

openai:
  api_key_env: "OPENAI_API_KEY"
  timeout_seconds: 30
  max_retries: 2

deepseek:
  api_key_env: "DEEPSEEK_API_KEY"
  base_url: "https://api.deepseek.com"
  timeout_seconds: 30
  max_retries: 2

wakeword:
  engine: "openwakeword"
  display_wake_word: "饭团饭团"
  wake_words:
    - "饭团饭团"
  wake_aliases:
    - "饭团"
    - "饭团你好"
  fuzzy_enabled: true
  fuzzy_threshold: 0.62
  require_greeting: false
  greeting_words:
    - "你好"
    - "你号"
  subject_keywords:
    - "饭团"
  listen_seconds: 2.5
  idle_pause_seconds: 0.2
  input_sample_rate: 48000
  model_sample_rate: 16000
  frame_ms: 80
  sample_rate: 48000
  channels: 1
  device: "auto"
  delete_chunks: true
  model_path: "models/vosk-model-small-cn-0.22"
  model_paths:
    - "models/openwakeword/fantuan_fantuan.onnx"
  target_labels:
    - "fantuan_fantuan"
  threshold: 0.5
  patience_frames: 1
  debounce_seconds: 1.5
  inference_framework: "onnx"
  allow_pretrained_models: false
  vad_enabled: true
  vad_threshold: 0.35
  noise_suppression_enabled: true
  noise_suppression_fallback: true
  log_scores: false
  block_size: 8000
  grammar_enabled: false

greeting:
  text: "小朋友你好"
  use_prerecorded_audio: false
  audio_path: "assets/audio/greeting.wav"

post_wake_speech:
  enabled: true
  timeout_seconds: 30
  sample_rate: 48000
  channels: 1
  device: "auto"
  block_seconds: 0.25
  rms_threshold: 500
  required_blocks: 2

recording:
  engine: "sounddevice"
  duration_seconds: 7
  sample_rate: 48000
  channels: 1
  device: "auto"

speech_to_text:
  provider: "static"
  model: "gpt-4o-mini-transcribe"
  language: "zh"
  static_text: "这是一段离线测试语音"

llm:
  provider: "deepseek"
  model: "deepseek-v4-flash"
  temperature: 0.2
  max_tokens: 500

tts:
  provider: "piper"
  binary: "piper"
  model_path: "models/piper/zh_CN-huayan-medium.onnx"
  model_config_path: "models/piper/zh_CN-huayan-medium.onnx.json"
  speaker: null
  length_scale: null
  noise_scale: null
  noise_w: null
  output_format: "wav"
  enabled: true
  cache_enabled: true
  command: null
  output_path: "recordings/piper_tts.wav"
  fallback_audio_path: "assets/audio/greeting.wav"

playback:
  enabled: true
  command: "auto"
  prefer_pipewire: true
  alsa_device: "auto"

display:
  engine: "robot_animation"
  fullscreen: true
  font_family: "Noto Sans CJK SC"
  font_size: 36
  result_hold_seconds: 8

robot_animation:
  frame_dir: "assets/robot/fantuan_jump"
  duration_seconds: 10
  final_frame: 7
  background_color: "#f7f3e8"
  text_color: "#1d2b2a"
  font_size: 36
